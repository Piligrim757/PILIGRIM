<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваш сайт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .content {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 20px 0;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .download-btn:active {
            transform: translateY(0);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        footer {
            margin-top: 40px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Добро пожаловать!</h1>
        <div class="content">
            <p>Это ваш обновлённый сайт. Статистика скачиваний собирается через GoatCounter.</p>
            <p>Количество скачиваний НЕ отображается на сайте.</p>
        </div>
        
        <button class="download-btn" id="downloadBtn">
            📥 Скачать файл
        </button>
        
        <div class="features">
            <div class="feature">
                <h3>⚡ Быстро</h3>
                <p>Мгновенная загрузка</p>
            </div>
            <div class="feature">
                <h3>🔒 Безопасно</h3>
                <p>Ваши данные в надежде</p>
            </div>
            <div class="feature">
                <h3>📊 Аналитика</h3>
                <p>Сбор статистики</p>
            </div>
        </div>
        
        <footer>
            <p>© 2024 Ваш сайт. Все права защищены.</p>
        </footer>
    </div>

    <!-- GoatCounter - сбор статистики (скрытый) -->
    <script>
        // Инициализация GoatCounter
        window.goatcounter = {
            // Настройка путей — убираем отображение, но оставляем сбор
            path: function(p) {
                // Возвращаем null для страниц, которые не нужно отслеживать
                // (оставляем пустым, чтобы всё отслеживалось, но не показывалось)
                return p;
            }
        };
        
        // Функция отправки события скачивания в GoatCounter
        function trackDownload(fileName) {
            // Используем событие GoatCounter
            if (window.goatcounter && window.goatcounter.count) {
                window.goatcounter.count({
                    path: '/download/' + fileName,
                    event: true,
                    title: 'Скачивание файла: ' + fileName
                });
            }
            
            // Дополнительно отправляем через fetch API (для надёжности)
            const siteCode = 'ВАШ_КОД_САЙТА'; // Замените на ваш код (без .goatcounter.com)
            fetch(`https://${siteCode}.goatcounter.com/count`, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    hits: [{
                        path: '/download/' + fileName,
                        event: true,
                        title: 'Скачивание файла: ' + fileName
                    }]
                })
            }).catch(e => console.log('GoatCounter error:', e));
        }
        
        // Обработка скачивания
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const fileName = 'example_file.zip';
            
            // Отправляем событие скачивания
            trackDownload(fileName);
            
            // Создаем и скачиваем тестовый файл
            const link = document.createElement('a');
            link.href = 'data:text/plain,Пример содержимого файла для скачивания';
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Уведомление (опционально)
            alert('Скачивание началось! Спасибо!');
        });
    </script>
    
    <!-- Подключение GoatCounter JS (асинхронно) -->
    <script data-goatcounter="https://piligrim757.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
